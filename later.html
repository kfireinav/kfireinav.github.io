<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --card: #111;
  --card2: #161616;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --border3: #333;
  --text: #efefef;
  --muted: #555;
  --faint: #2a2a2a;
  --sans: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px; background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 20px;
}
.logo { font-family: var(--mono); font-size: 14px; color: var(--text); flex-shrink: 0; letter-spacing: -0.02em; }
.url-bar {
  flex: 1; max-width: 540px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 6px; padding: 0 14px; height: 34px;
  font-family: var(--mono); font-size: 13px; color: var(--text); outline: none;
  transition: border-color 0.12s;
}
.url-bar::placeholder { color: var(--muted); }
.url-bar:focus { border-color: var(--border3); }
.btn { font-family: var(--sans); font-size: 13px; font-weight: 500; height: 34px; padding: 0 16px; border-radius: 6px; border: none; cursor: pointer; transition: opacity 0.1s; }
.btn-primary { background: var(--text); color: #000; }
.btn-primary:hover { opacity: 0.82; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--border3); }
.topbar-right { margin-left: auto; }

.layout { display: flex; margin-top: 52px; }

.sidebar {
  width: 192px; flex-shrink: 0;
  position: fixed; top: 52px; left: 0; bottom: 0;
  border-right: 1px solid var(--border);
  padding: 16px 0; overflow-y: auto;
  display: flex; flex-direction: column;
}
.s-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 14px; margin: 16px 0 4px; font-family: var(--mono); }
.s-label:first-child { margin-top: 0; }
.nav-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 7px 14px; background: none; border: none;
  font-family: var(--sans); font-size: 13px; color: var(--muted);
  cursor: pointer; text-align: left; transition: color 0.1s;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--text); }
.nav-name { display: flex; align-items: center; gap: 8px; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.nav-cnt { font-size: 11px; font-family: var(--mono); color: var(--faint); }
.nav-btn.active .nav-cnt { color: #3a3a3a; }
.sidebar-foot { margin-top: auto; padding: 14px; }
.mgr-btn { width: 100%; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 7px; font-family: var(--sans); font-size: 12px; color: var(--muted); cursor: pointer; }
.mgr-btn:hover { color: var(--text); border-color: var(--border2); }

.main { margin-left: 192px; flex: 1; padding: 24px 24px 60px; min-width: 0; }
.main-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.main-title { font-size: 15px; font-weight: 500; }
.sort-sel { font-family: var(--mono); font-size: 11px; background: transparent; border: none; color: var(--muted); cursor: pointer; outline: none; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: 10px; }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; position: relative;
  transition: border-color 0.12s, transform 0.12s; cursor: pointer;
}
.card:hover { border-color: var(--border2); transform: translateY(-1px); }
.card.done { opacity: 0.3; }

.card-img { width: 100%; aspect-ratio: 16/9; background: var(--card2); overflow: hidden; position: relative; }
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* fallback: big domain centered */
.card-fallback {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.fallback-favicon { width: 32px; height: 32px; border-radius: 6px; }
.fallback-domain { font-family: var(--mono); font-size: 12px; color: #333; }

.fav { position: absolute; bottom: 7px; left: 7px; width: 18px; height: 18px; border-radius: 3px; overflow: hidden; background: var(--card); }
.fav img { width: 100%; height: 100%; }
.cat-pill {
  position: absolute; top: 7px; right: 7px;
  font-size: 10px; font-family: var(--mono); letter-spacing: 0.03em;
  background: rgba(10,10,10,0.88); padding: 2px 8px; border-radius: 4px;
}
.card-body { padding: 11px 13px 13px; }
.card-title {
  font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-desc {
  font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-foot { display: flex; justify-content: space-between; }
.card-domain { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.card-ago { font-family: var(--mono); font-size: 10px; color: var(--faint); }
.card-note { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); font-style: italic; }
.card-acts {
  position: absolute; top: 7px; left: 7px;
  display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s;
}
.card:hover .card-acts { opacity: 1; }
.act {
  width: 26px; height: 26px; border-radius: 5px;
  background: rgba(10,10,10,0.9); border: 1px solid #2a2a2a;
  color: var(--muted); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.act:hover { color: var(--text); }

.empty { grid-column: 1/-1; padding: 80px 0; text-align: center; color: var(--muted); font-size: 13px; }
.empty-hint { color: var(--faint); font-size: 12px; margin-top: 6px; }

/* OVERLAY */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #111; border: 1px solid var(--border2);
  border-radius: 12px; padding: 24px; width: min(480px, 95vw);
  transform: translateY(6px); transition: transform 0.15s;
  max-height: 90vh; overflow-y: auto;
}
.overlay.open .modal { transform: translateY(0); }
.modal-h { font-size: 15px; font-weight: 500; margin-bottom: 18px; }
.field-lbl { font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin: 14px 0 5px; }
.modal input[type=text], .modal textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; padding: 9px 12px; color: var(--text);
  font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.12s;
}
.modal input[type=text]:focus, .modal textarea:focus { border-color: var(--border3); }
.modal input[type=text]::placeholder { color: var(--muted); }
.modal textarea { resize: vertical; min-height: 60px; font-family: var(--sans); font-size: 13px; }
.modal-acts { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* PREVIEW STRIP */
.prev-strip { margin-bottom: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.prev-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.prev-body { padding: 9px 12px; }
.prev-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.prev-desc { font-size: 11px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.prev-domain { font-size: 10px; font-family: var(--mono); color: #333; margin-top: 5px; }
.fetching { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-family: var(--mono); }

/* CAT PICKER */
.cat-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
.cat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--bg);
  font-size: 12px; color: var(--muted); cursor: pointer;
  font-family: var(--sans); transition: all 0.1s;
}
.cat-chip:hover { border-color: var(--border3); color: var(--text); }
.cat-chip.selected { border-color: var(--border3); color: var(--text); background: var(--card2); }
.cat-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.chip-new {
  padding: 5px 11px; border-radius: 20px;
  border: 1px dashed var(--border2); background: transparent;
  font-size: 12px; color: var(--muted); cursor: pointer;
  font-family: var(--sans); transition: all 0.1s;
}
.chip-new:hover { border-color: var(--border3); color: var(--text); }
.new-cat-inline { margin-top: 10px; padding: 12px; background: var(--card2); border: 1px solid var(--border2); border-radius: 8px; display: none; }
.new-cat-inline.open { display: block; }
.new-cat-row { display: flex; gap: 8px; align-items: center; }
.new-cat-row input[type=text] { flex: 1; }
input[type=color] { width: 34px; height: 34px; border: 1px solid var(--border2); border-radius: 6px; background: var(--bg); cursor: pointer; padding: 3px; flex-shrink: 0; }
.save-cat-btn { height: 34px; padding: 0 14px; font-size: 12px; }

/* CAT MANAGER */
.cat-list { display: flex; flex-direction: column; gap: 5px; max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.cat-row { display: flex; align-items: center; gap: 10px; background: var(--card2); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; }
.c-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.c-name { flex: 1; font-size: 13px; }
.c-cnt { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-right: 4px; }
.c-del { background: none; border: none; color: var(--faint); font-size: 14px; cursor: pointer; padding: 0 4px; border-radius: 4px; }
.c-del:hover { color: #c0392b; }
.new-row { display: flex; gap: 8px; margin-top: 4px; }
.new-row input[type=text] { flex: 1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<script>
const SK_I='later-items-v5', SK_C='later-cats-v5';
let items=[], cats=[], currentFilter='all', editId=null, meta={}, prevTimer=null, selectedCatId='';

function load() {
  try { items=JSON.parse(localStorage.getItem(SK_I))||[]; } catch(e){ items=[]; }
  try { cats=JSON.parse(localStorage.getItem(SK_C))||[]; } catch(e){ cats=[]; }
  render(); renderSidebar();
}
function persist(){ localStorage.setItem(SK_I,JSON.stringify(items)); localStorage.setItem(SK_C,JSON.stringify(cats)); }

const getCat   = id => cats.find(c=>c.id===id)||null;
const getDomain= url => { try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return ''; } };
const isUrl    = s => /^https?:\/\//i.test(s)||/^[a-z0-9-]+\.[a-z]{2,}/i.test(s);
const fixUrl   = s => /^https?:\/\//i.test(s)?s:'https://'+s;
const ago      = ts => { const d=Date.now()-ts,m=Math.floor(d/60000); if(m<2)return'now'; if(m<60)return m+'m'; const h=Math.floor(m/60); if(h<24)return h+'h'; const dy=Math.floor(h/24); if(dy<30)return dy+'d'; return Math.floor(dy/30)+'mo'; };

/* ── PREVIEW ── */
function getYouTubeId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
    if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
  } catch(e){}
  return null;
}

function schedPrev() {
  clearTimeout(prevTimer);
  const v = document.getElementById('m-url').value.trim();
  if (!v||!isUrl(v)){ hidePrev(); return; }
  prevTimer = setTimeout(()=>fetchPrev(fixUrl(v)), 600);
}

async function fetchPrev(url) {
  document.getElementById('fetching').style.display='block';
  hidePrev(); meta={};

  // YouTube: use thumbnail + oEmbed (no CORS issues)
  const ytId = getYouTubeId(url);
  if (ytId) {
    try {
      const oe = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
      if (oe.ok) {
        const d = await oe.json();
        meta = {
          title:  d.title||'',
          desc:   d.author_name ? 'by '+d.author_name : '',
          image:  `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`,
          domain: 'youtube.com', url
        };
        showPrev(meta);
        document.getElementById('fetching').style.display='none';
        return;
      }
    } catch(e){}
    // fallback: just use thumbnail
    meta = { title:'', desc:'', image:`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`, domain:'youtube.com', url };
    showPrev(meta);
    document.getElementById('fetching').style.display='none';
    return;
  }

  // General: try two CORS proxies in sequence
  const proxies = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  ];

  for (const makeProxy of proxies) {
    try {
      const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(7000) });
      let html = '';
      if (res.ok) {
        const ct = res.headers.get('content-type')||'';
        if (ct.includes('json')) {
          const j = await res.json();
          html = j.contents || j.body || '';
        } else {
          html = await res.text();
        }
      }
      if (!html) continue;
      const doc = new DOMParser().parseFromString(html,'text/html');
      const og  = p => { const e=doc.querySelector(`meta[property="${p}"],meta[name="${p}"]`); return e?e.getAttribute('content'):''; };
      meta = {
        title:  og('og:title')||doc.title||getDomain(url),
        desc:   og('og:description')||og('description')||'',
        image:  og('og:image')||'',
        domain: getDomain(url), url
      };
      showPrev(meta);
      document.getElementById('fetching').style.display='none';
      return;
    } catch(e){ continue; }
  }

  // All proxies failed — show domain fallback
  meta = { title: getDomain(url), desc:'', image:'', domain: getDomain(url), url };
  document.getElementById('fetching').style.display='none';
}

function showPrev(m) {
  const strip = document.getElementById('prev-strip');
  const img   = document.getElementById('prev-img');
  if (m.image) { img.src=m.image; img.style.display='block'; } else { img.style.display='none'; }
  document.getElementById('prev-title').textContent  = m.title||'';
  document.getElementById('prev-desc').textContent   = m.desc||'';
  document.getElementById('prev-domain').textContent = m.domain||'';
  strip.style.display = 'block';
}
function hidePrev(){ document.getElementById('prev-strip').style.display='none'; }

/* ── CAT PICKER ── */
function renderCatPicker(selId) {
  selectedCatId = selId||'';
  document.getElementById('cat-picker').innerHTML =
    cats.map(c=>`<button class="cat-chip${selectedCatId===c.id?' selected':''}" onclick="selectCat('${c.id}')">
      <span class="chip-dot" style="background:${c.color}"></span>${c.name}
    </button>`).join('')
    + `<button class="chip-new" onclick="openNewCatForm()">+ new</button>`;
}
function selectCat(id){ selectedCatId=selectedCatId===id?'':id; renderCatPicker(selectedCatId); }
function openNewCatForm(){ document.getElementById('new-cat-form').classList.add('open'); document.getElementById('nc-name').focus(); }
function closeNewCatForm(){ document.getElementById('new-cat-form').classList.remove('open'); document.getElementById('nc-name').value=''; }
function createCatInline() {
  const name=document.getElementById('nc-name').value.trim(); if(!name)return;
  const color=document.getElementById('nc-color').value;
  const c={id:'c'+Date.now(),name,color};
  cats.push(c); persist(); renderSidebar();
  closeNewCatForm(); renderCatPicker(c.id);
}

/* ── MODALS ── */
function handleAdd(){ openAdd(document.getElementById('url-bar').value.trim()); }

function openAdd(prefill,eid) {
  editId=eid||null; meta={};
  hidePrev(); document.getElementById('fetching').style.display='none'; closeNewCatForm();
  document.getElementById('add-h').textContent=eid?'Edit item':'Save link';
  if (eid) {
    const item=items.find(x=>x.id===eid);
    document.getElementById('m-url').value=item.url||item.title||'';
    document.getElementById('m-note').value=item.note||'';
    meta={title:item.title,desc:item.desc,image:item.image,domain:item.domain,url:item.url};
    if(item.title||item.image) showPrev(meta);
    renderCatPicker(item.catId||'');
  } else {
    document.getElementById('m-url').value=prefill||'';
    document.getElementById('m-note').value='';
    renderCatPicker('');
    if(prefill&&isUrl(prefill)) fetchPrev(fixUrl(prefill));
  }
  document.getElementById('add-ov').classList.add('open');
  setTimeout(()=>document.getElementById(eid?'m-note':'m-url').focus(),80);
}
function closeAdd(){
  document.getElementById('add-ov').classList.remove('open');
  document.getElementById('url-bar').value='';
  editId=null; meta={}; clearTimeout(prevTimer); closeNewCatForm();
}
function openManage(){ renderCatMgr(); document.getElementById('mgr-ov').classList.add('open'); }
function closeMgr(){ document.getElementById('mgr-ov').classList.remove('open'); render(); renderSidebar(); }

/* ── SAVE ── */
function saveItem() {
  const raw=document.getElementById('m-url').value.trim(); if(!raw)return;
  const url=isUrl(raw)?fixUrl(raw):null;
  const catId=selectedCatId, note=document.getElementById('m-note').value.trim();
  const title=meta.title||(url?getDomain(url):raw);
  const desc=meta.desc||'', image=meta.image||'', domain=meta.domain||(url?getDomain(url):'');
  if(editId){ const item=items.find(x=>x.id===editId); if(item)Object.assign(item,{url,title,desc,image,domain,catId,note}); }
  else items.unshift({id:Date.now().toString(),url,title,desc,image,domain,catId,note,done:false,added:Date.now()});
  persist(); closeAdd(); render(); renderSidebar();
}

/* ── FILTER ── */
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function getFiltered(){
  let list=[...items];
  if(currentFilter==='done') list=list.filter(x=>x.done);
  else if(currentFilter==='all') list=list.filter(x=>!x.done);
  else list=list.filter(x=>x.catId===currentFilter&&!x.done);
  const s=document.getElementById('sort-sel')?.value||'newest';
  list.sort(s==='oldest'?(a,b)=>a.added-b.added:(a,b)=>b.added-a.added);
  return list;
}

/* ── RENDER ── */
function render(){
  const list=getFiltered(), grid=document.getElementById('grid');
  const undone=items.filter(x=>!x.done);
  document.getElementById('cnt-all').textContent=undone.length;
  document.getElementById('cnt-done').textContent=items.filter(x=>x.done).length;
  const cat=getCat(currentFilter);
  document.getElementById('main-title').textContent=cat?cat.name:({all:'All',done:'Done'}[currentFilter]||'All');

  if(!list.length){
    grid.innerHTML=`<div class="empty"><div style="font-size:28px;margin-bottom:10px;color:#222">○</div>Nothing here<div class="empty-hint">Paste a URL in the bar above</div></div>`;
    return;
  }

  grid.innerHTML=list.map(item=>{
    const cat=getCat(item.catId);
    const pill=cat?`<span class="cat-pill" style="color:${cat.color}">${cat.name}</span>`:'';
    const fav=item.domain?`<div class="fav"><img src="https://www.google.com/s2/favicons?domain=${item.domain}&sz=32" alt="" /></div>`:'';

    let imgHtml;
    if(item.image){
      imgHtml=`<img src="${item.image}" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="card-fallback" style="display:none">
          ${item.domain?`<img class="fallback-favicon" src="https://www.google.com/s2/favicons?domain=${item.domain}&sz=64" alt="" />`:''}
          <span class="fallback-domain">${item.domain||''}</span>
        </div>`;
    } else {
      imgHtml=`<div class="card-fallback">
        ${item.domain?`<img class="fallback-favicon" src="https://www.google.com/s2/favicons?domain=${item.domain}&sz=64" alt="" />`:''}
        <span class="fallback-domain">${item.domain||''}</span>
      </div>`;
    }

    return `<div class="card${item.done?' done':''}" onclick="openLink('${item.id}')">
      <div class="card-img">${imgHtml}${fav}${pill}</div>
      <div class="card-acts" onclick="event.stopPropagation()">
        <button class="act" title="${item.done?'Undo':'Done'}" onclick="toggleDone('${item.id}')">${item.done?'↺':'✓'}</button>
        <button class="act" title="Edit" onclick="openAdd(null,'${item.id}')">✎</button>
        <button class="act" title="Delete" onclick="del('${item.id}')">✕</button>
      </div>
      <div class="card-body">
        <div class="card-title">${item.title||item.domain||'Untitled'}</div>
        ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
        <div class="card-foot">
          <span class="card-domain">${item.domain||''}</span>
          <span class="card-ago">${ago(item.added)}</span>
        </div>
        ${item.note?`<div class="card-note">${item.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function openLink(id){ const i=items.find(x=>x.id===id); if(i&&i.url)window.open(i.url,'_blank'); }
function toggleDone(id){ const i=items.find(x=>x.id===id); if(i){i.done=!i.done;persist();render();renderSidebar();} }
function del(id){ if(!confirm('Remove?'))return; items=items.filter(x=>x.id!==id); persist();render();renderSidebar(); }

function renderSidebar(){
  const undone=items.filter(x=>!x.done);
  document.getElementById('sidebar-cats').innerHTML=cats.map(c=>{
    const cnt=undone.filter(x=>x.catId===c.id).length;
    return `<button class="nav-btn${currentFilter===c.id?' active':''}" onclick="setFilter('${c.id}',this)">
      <span class="nav-name"><span class="nav-dot" style="background:${c.color}"></span>${c.name}</span>
      <span class="nav-cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function renderCatMgr(){
  const el=document.getElementById('cat-list');
  if(!cats.length){el.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:4px 0">No categories yet.</div>`;return;}
  el.innerHTML=cats.map(c=>{
    const cnt=items.filter(x=>x.catId===c.id).length;
    return `<div class="cat-row">
      <span class="c-dot" style="background:${c.color}"></span>
      <span class="c-name">${c.name}</span>
      <span class="c-cnt">${cnt} items</span>
      <button class="c-del" onclick="delCat('${c.id}')">✕</button>
    </div>`;
  }).join('');
}
function addCatFromMgr(){
  const name=document.getElementById('mgr-nc-name').value.trim(); if(!name)return;
  const color=document.getElementById('mgr-nc-color').value;
  cats.push({id:'c'+Date.now(),name,color});
  document.getElementById('mgr-nc-name').value='';
  persist(); renderCatMgr(); renderSidebar();
}
function delCat(id){
  if(items.some(x=>x.catId===id)&&!confirm('Items will be uncategorized. Continue?'))return;
  items.forEach(x=>{if(x.catId===id)x.catId='';});
  cats=cats.filter(c=>c.id!==id);
  if(currentFilter===id) currentFilter='all';
  persist(); renderCatMgr(); renderSidebar();
}

document.getElementById('url-bar').addEventListener('keydown',e=>{ if(e.key==='Enter')handleAdd(); });
document.getElementById('nc-name').addEventListener('keydown',e=>{ if(e.key==='Enter')createCatInline(); });
document.getElementById('mgr-nc-name').addEventListener('keydown',e=>{ if(e.key==='Enter')addCatFromMgr(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeAdd();closeMgr();} });

load();
</script>


</body></html>
